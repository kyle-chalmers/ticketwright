name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  selftest:
    name: Kit self-test (bash 3.2-safe, stdlib-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure yq
        run: |
          if ! command -v yq >/dev/null 2>&1; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version

      - name: Self-test (config + adapters + hooks + index)
        run: bash bin/selftest.sh

      - name: Ticket index is in sync (staleness gate)
        run: python3 bin/build_ticket_index.py --check
